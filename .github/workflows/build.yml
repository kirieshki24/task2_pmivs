name: Build All Platforms

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ── Tests (runs on Linux, fast) ────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run core unit tests (JVM)
        run: ./gradlew :core:jvmTest --no-daemon

      - name: Run shared common tests (JVM)
        run: ./gradlew :app:shared:jvmTest --no-daemon

  # ── Android ────────────────────────────────────────────────────────────────
  android:
    name: Android Debug Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Android APK
        run: ./gradlew :app:androidApp:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: app/androidApp/build/outputs/apk/debug/*.apk

  # ── Desktop (JVM / Linux) ──────────────────────────────────────────────────
  desktop:
    name: Desktop Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Desktop distribution
        run: ./gradlew :app:desktopApp:createReleaseDistributable --no-daemon

      - name: Upload Desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-distributable
          path: app/desktopApp/build/compose/binaries/main-release/app/

  # ── Web (JS) ───────────────────────────────────────────────────────────────
  web-js:
    name: Web JS Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Web JS
        run: ./gradlew :app:webApp:jsBrowserDistribution --no-daemon

      - name: Upload Web JS artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-js-dist
          path: app/webApp/build/dist/js/productionExecutable/

  # ── Web (WASM) ─────────────────────────────────────────────────────────────
  web-wasm:
    name: Web WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Web WASM
        run: ./gradlew :app:webApp:wasmJsBrowserDistribution --no-daemon

      - name: Upload Web WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-wasm-dist
          path: app/webApp/build/dist/wasmJs/productionExecutable/

  # ── iOS (macOS runner) ─────────────────────────────────────────────────────
  ios:
    name: iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build iOS framework
        run: ./gradlew :app:shared:linkDebugFrameworkIosSimulatorArm64 --no-daemon

      - name: Upload iOS framework
        uses: actions/upload-artifact@v4
        with:
          name: ios-framework
          path: app/shared/build/bin/iosSimulatorArm64/debugFramework/